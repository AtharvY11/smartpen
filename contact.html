<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - LogiPen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html" class="logo-wrap">
    <img src="logo.png" alt="LogiPen Logo" class="logo-img">
  </a>
  <nav>
    <a href="index.html">Home</a>
    <a href="product.html">Product</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html" class="active">Contact</a>
    <a href="login.html" class="nav-cta">Login</a>
  </nav>
</header>

<section class="page-hero">
  <div class="page-hero-inner">
    <div class="section-tag">Get In Touch</div>
    <h1 class="page-title">We'd love to <em>hear</em> from you</h1>
    <p class="page-subtitle">Have a question? We're here to help.</p>
  </div>
</section>

<section class="contact-section">
  <div class="contact-grid">
    <div class="contact-info-col">
      <h2 class="contact-heading">Customer Support</h2>
      <p class="contact-subtext">Our team is available Monday–Saturday, 9am to 6pm IST.</p>
      <div class="contact-cards">
        <div class="contact-card">
          <div class="contact-card-icon">✉</div>
          <div>
            <div class="contact-card-label">Email Us</div>
            <div class="contact-card-value">support@logipen.com</div>
          </div>
        </div>
        <div class="contact-card">
          <div class="contact-card-icon">✆</div>
          <div>
            <div class="contact-card-label">Call Us</div>
            <div class="contact-card-value">+91 9876543210</div>
          </div>
        </div>
        <div class="contact-card">
          <div class="contact-card-icon">◷</div>
          <div>
            <div class="contact-card-label">Working Hours</div>
            <div class="contact-card-value">Mon–Sat, 9am – 6pm IST</div>
          </div>
        </div>
      </div>
    </div>
    <div class="contact-form-col">
      <div class="form-card">
        <h3 class="form-title">Send us a message</h3>
        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input type="text" class="form-input" placeholder="e.g. Rahul Sharma">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Subject</label>
          <input type="text" class="form-input" placeholder="How can we help?">
        </div>
        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea class="form-input form-textarea" placeholder="Write your message here..."></textarea>
        </div>
        <button class="add-to-cart-btn" onclick="sendMessage(this)">Send Message</button>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="footer-left">
    <img src="logo.png" alt="LogiPen" class="footer-logo">
  </div>
  <div class="footer-center">
    <div class="footer-social">
      <a href="https://www.instagram.com/smartpenindia?igsh=dmRneW0yYWkzNXRh" target="_blank" class="social-icon" title="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <a href="https://youtube.com/shorts/LXm--ZUOd-g" target="_blank" class="social-icon" title="YouTube">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
          <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <a href="https://facebook.com/yourpage" target="_blank" class="social-icon" title="Facebook">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        </svg>
      </a>
      <a href="https://wa.me/919876543210" target="_blank" class="social-icon" title="WhatsApp">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>

    </div>
    
  </div>
  <div class="footer-right"></div>
</footer>

<script src="script.js"></script>
</body>
</html>
